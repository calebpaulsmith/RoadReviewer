name: Deploy web/ to GitHub Pages

# Publishes web/ (the FHWA Road Checker static prototype, §7b) to GitHub
# Pages. The site has no build step - this workflow just uploads the
# folder as-is. Requires a one-time repo setting: Settings > Pages >
# Build and deployment > Source > "GitHub Actions".
#
# Split into build + deploy jobs (GitHub's canonical static-content shape)
# on purpose: "Re-run failed jobs" then re-runs only the deploy job, which
# does NOT re-upload the Pages artifact, so it can't hit the
# "Multiple artifacts named github-pages ... Artifact count is 2" error.
# That error comes from re-running a single-job workflow — attempt 2's
# upload-pages-artifact adds a SECOND github-pages artifact alongside
# attempt 1's, and deploy-pages then finds two. If a deploy is ever wedged,
# prefer a FRESH run (push, or Actions > Run workflow) over "Re-run all
# jobs", which would re-upload and reintroduce the duplicate.

on:
  push:
    branches: [main]
    paths:
      - "web/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload web/ as Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: web

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
